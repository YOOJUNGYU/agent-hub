name: release

# 태그(vX.Y.Z) 푸시 시 Release 빌드 → Velopack 패키징 → GitHub Release 자동 게시
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    # SignPath 시크릿이 설정돼 있으면 서명 단계가 활성화된다(없으면 자동 skip → 미서명 릴리스).
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore AgentHub.sln

      - name: Build (Release)
        run: msbuild AgentHub.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: echo "version=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Pack (Velopack)
        run: vpk pack -u AgentHub -v ${{ steps.ver.outputs.version }} -p install\Release -e AgentHub.exe --framework net48,webview2

      # ===== 코드 서명 (SignPath) — 시크릿/변수 설정 시에만 동작. 자세한 설정은 docs/signing-signpath.md =====
      - name: Upload unsigned installer for signing
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: Releases/*Setup.exe

      - name: Sign installer (SignPath)
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: Releases   # 서명된 Setup.exe로 덮어써 업로드에 반영

      - name: Upload to GitHub Release
        run: vpk upload github --repoUrl https://github.com/YOOJUNGYU/agent-hub --token ${{ secrets.GITHUB_TOKEN }} --publish --releaseName "Agent Hub ${{ steps.ver.outputs.version }}" --tag ${{ github.ref_name }}

      # 자동 업데이트에 불필요한 포터블(zip) 자산을 릴리스에서 제거(매니페스트는 nupkg만 참조하므로 업데이트에 영향 없음).
      # vpk는 매니페스트 기준으로 업로드하므로 사전 파일 삭제는 실패한다 → 업로드 완료 후 자산만 삭제한다.
      - name: Remove portable asset (keep only auto-update assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete-asset ${{ github.ref_name }} AgentHub-win-Portable.zip --yes
