<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#181c2a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/app.css" />
  <title>Agent Hub — 모니터</title>
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="logo">◈</span> Agent Hub</div>
    <div class="server-status">
      <span class="badge" id="wsBadge"><span class="spinner"></span><span data-i18n="ws.connecting">연결 중…</span></span>
      <label class="lang-switch"><span aria-hidden="true">🌐</span>
        <select class="lang-select" data-lang-select aria-label="Language / 언어">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </label>
    </div>
  </header>
  <main>
    <!-- 인증 요청 화면 -->
    <section id="authRequest" class="screen" hidden>
      <div class="auth-card">
        <h2 data-i18n="auth.title">기기 인증이 필요합니다</h2>
        <p class="hint" data-i18n="auth.desc">이 기기의 접속을 허용하려면 PC(Agent Hub)에서 승인해야 합니다. 아래에 기기 이름을 입력하고 인증을 요청하세요.</p>
        <input type="text" id="deviceName" maxlength="40" data-i18n-ph="auth.namePh" placeholder="기기 이름 (예: 내 아이폰)" />
        <button id="requestBtn" data-i18n="auth.requestBtn">인증 요청 보내기</button>
        <p class="hint" id="requestHint"></p>
      </div>
    </section>

    <!-- 승인 대기 화면 -->
    <section id="authPending" class="screen" hidden>
      <div class="auth-card">
        <div class="loading"><span class="spinner"></span></div>
        <h2 data-i18n="pending.title">승인 대기 중…</h2>
        <p class="hint" data-i18n="pending.desc">PC(Agent Hub)에서 이 기기를 승인하면 자동으로 모니터 화면이 표시됩니다.</p>
      </div>
    </section>

    <!-- 모니터 화면 -->
    <section id="monitor" class="screen" hidden>
      <div class="summary" id="summary"></div>
      <div class="agent-grid" id="agentGrid">
        <div class="loading"><span class="spinner"></span><span data-i18n="monitor.loading">에이전트 정보를 불러오는 중…</span></div>
      </div>
    </section>
  </main>
  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
