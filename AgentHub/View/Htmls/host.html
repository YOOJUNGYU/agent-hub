<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#181c2a" />
  <link rel="stylesheet" href="/css/app.css" />
  <title>Agent Hub — 콘솔</title>
</head>
<body class="host-shell">
  <header class="app-header">
    <div class="server-status">
      <span class="badge" id="statusBadge"><span class="spinner"></span><span data-i18n="server.checking">확인 중…</span></span>
      <a class="server-url" id="serverUrl" target="_blank" rel="noopener"></a>
    </div>
    <div class="hdr-right">
      <a class="guide-link" href="/guide.html" target="_blank" rel="noopener" data-i18n="guide.link">📖 사용 안내</a>
      <label class="lang-switch"><span aria-hidden="true">🌐</span>
        <select class="lang-select" data-lang-select aria-label="Language / 언어">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </label>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab active" data-view="devices" data-i18n="tab.devices">기기 관리</button>
    <button class="tab" data-view="clients" data-i18n="tab.clients">연결된 기기</button>
    <button class="tab" data-view="logs" data-i18n="tab.logs">로그</button>
    <button class="tab" data-view="settings" data-i18n="tab.settings">설정</button>
  </nav>
  <main>
    <section id="devices" class="view active">
      <div class="summary">
        <div class="stat"><div class="n" id="pendingCount">0</div><div class="l" data-i18n="devices.pending">인증 대기</div></div>
        <div class="stat"><div class="n" id="approvedCount">0</div><div class="l" data-i18n="devices.approved">승인된 기기</div></div>
      </div>
      <div id="deviceList">
        <div class="loading"><span class="spinner"></span><span data-i18n="devices.loading">기기 정보를 불러오는 중…</span></div>
      </div>
    </section>
    <section id="clients" class="view">
      <div class="summary">
        <div class="stat"><div class="n" id="clientCount">0</div><div class="l" data-i18n="clients.count">접속한 모바일 기기</div></div>
      </div>
      <div id="clientList">
        <div class="loading"><span class="spinner"></span><span data-i18n="clients.loading">접속 기기 정보를 불러오는 중…</span></div>
      </div>
    </section>
    <section id="logs" class="view">
      <div class="log-list" id="logList"></div>
    </section>
    <section id="settings" class="view">
      <form id="settingsForm" class="settings-form">
        <div class="settings-col">
          <h3 class="settings-h" data-i18n="settings.general">일반</h3>
          <label data-i18n="settings.lang">언어 (Language)</label>
          <select class="lang-select" data-lang-select aria-label="Language / 언어">
            <option value="ko">한국어</option>
            <option value="en">English</option>
          </select>
          <label for="portInput" data-i18n="settings.portLabel">서버 포트 (1024–65535)</label>
          <input type="number" id="portInput" min="1024" max="65535" required />
          <button type="submit" data-i18n="settings.save">저장 후 재시작</button>
          <p class="hint" id="settingsHint" data-i18n="settings.hint">포트를 바꾸면 서버가 재시작되고 접속 주소가 변경됩니다.</p>
          <label class="chk"><input type="checkbox" id="autoStart" /> <span data-i18n="settings.autoStart">Windows 시작 시 자동 실행</span></label>
          <p class="hint" data-i18n="settings.autoStartHint">로그인하면 Agent Hub가 자동으로 실행됩니다(기본 켜짐). 설치본에서만 적용됩니다.</p>
        </div>
      </form>
    </section>
  </main>
  <script src="/js/i18n.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
